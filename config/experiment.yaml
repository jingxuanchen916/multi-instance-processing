# Experiment Configuration
# - null or "all" = use all available from config files
# - A list = use only those specified
# This file is copied to each output directory as a snapshot.

dataset:
  type: tweets         # Dataset type: tweets | ner | wsd | sentiment | news | language | arithmetic | parity
  path: data/tweets    # Dataset directory (e.g., data/tweets, data/ner, ...)

evaluation:
  # models:                     # Quick test: single model
  #   - openai/gpt-oss-120b
  models: null                # All models from config/models.yaml
  
  # questions:                  # Quick test: specific questions
  #   - Q1
  questions: null             # All questions in the dataset
  
  n_trials: 1                   # Trials per (model, question, selection)
  max_concurrent: 50           # Maximum concurrent API requests

  # resume_from: "20251205_002937"  # Resume from an existing run
  resume_from: null           # Null = start new run

# Dataset-specific configurations
# arithmetic:
# language:
# ner:
# news:
# parity:
# sentiment:
tweets:
# wsd:
  # Instance selection strategy - choose one:

  # Option 1: first_n - use first N instances
  # instance_selection: first_n
  # counts:
  #   - 10
  #   - 100
  # counts: null                # null = all standard sizes

  # Option 2: sliding_window - slide windows across instances
  # instance_selection: sliding_window
  # counts:                     # Window sizes (null = all standard sizes)
  #   - 1
  # window_end: null            # Optional: limit sliding to first N instances (null = use all)

  # Option 3: custom - use selection YAML
  instance_selection: custom
  selection_config: config/selections/tweets_selection.yaml  # Required when custom
