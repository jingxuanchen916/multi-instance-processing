# Questions/tasks to evaluate - Parity Check
questions:
  Q1:
    id: "Q1"
    name: "count_odd_numbers"
    description: "Count how many numbers are odd"
    prompt_template: |
      Task: Count how many of the provided numbers are odd.
      
      Background:
      - An odd number is an integer that is not evenly divisible by 2
      - Odd numbers end in 1, 3, 5, 7, or 9
      - An even number is an integer that is evenly divisible by 2
      - Even numbers end in 0, 2, 4, 6, or 8
      
      Instructions:
      - Check each number to determine if it is odd or even
      - Count how many numbers are odd
      - Do not count even numbers
      - If you only receive one number, return 1 if it's odd, else return 0
      
      Response format:
      Return a JSON object with:
      - "reasoning": briefly explain your approach to identifying odd numbers
      - "answer": integer count of odd numbers
      
      Example:
      {"reasoning": "your approach here", "answer": 3}
    answer_type: "integer"
    
  Q2:
    id: "Q2"
    name: "classify_parity_all"
    description: "Classify each number as odd or even and provide summary counts"
    prompt_template: |
      Task: For each number, identify whether it is odd or even, then provide summary counts for both categories.
      
      Background:
      - An odd number is an integer that is not evenly divisible by 2
      - Odd numbers end in 1, 3, 5, 7, or 9 (label 1)
      - An even number is an integer that is evenly divisible by 2
      - Even numbers end in 0, 2, 4, 6, or 8 (label 0)
      
      Instructions:
      - Check each number to determine if it is odd or even
      - Classify each number using the labels:
        * 1 = odd
        * 0 = even
      - Provide the classification for each individual number
      - Also provide summary counts for both odd and even categories
      
      Response format:
      Return a JSON object with:
      - One key per number: "1", "2", "3", …, mapping to the classification (0 or 1)
      - "odd": integer count of numbers classified as odd
      - "even": integer count of numbers classified as even
      - "reasoning": brief explanation of your approach
      
      Example for 5 numbers:
      {"1": 0, "2": 1, "3": 0, "4": 1, "5": 1, "odd": 3, "even": 2, "reasoning": "your approach here"}
    answer_type: "dict"
