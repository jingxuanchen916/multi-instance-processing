# Questions/tasks to evaluate
questions:
  Q1:
    id: "Q1"
    name: "count_word_women"
    description: "Count occurrences of the word 'women' in all tweets"
    prompt_template: |
      Task: Count how many times the word "women" appears in the provided tweets.
      
      Instructions:
      - Search is case-insensitive (e.g., "women", "Women", "WOMEN" all count)
      - Count occurrences that include the substring "women" (e.g., "women", "womens", "women's", "womenfolk")
      - Do not count forms that lack the substring "women" (e.g., "woman", "womankind")
      - Count all occurrences across all tweets, not just unique tweets
      - If you only receive one tweet, just return the occurrence for that tweet
      
      Response format:
      Return a JSON object with:
      - "reasoning": briefly explain how you counted the matches
      - "answer": integer total count
      
      Example:
      {"reasoning": "your approach here", "answer": 42}
    answer_type: "integer"
  
  Q2:
    id: "Q2"
    name: "count_word_women_per_tweet"
    description: "Count occurrences of 'women' in each tweet and provide total"
    prompt_template: |
      Task: For each tweet, count how many times the word "women" appears, then provide the total count.
      
      Instructions:
      - Search is case-insensitive (e.g., "women", "Women", "WOMEN" all count)
      - Count occurrences that include the substring "women" (e.g., "women", "womens", "women's", "womenfolk")
      - Do not count forms that lack the substring "women" (e.g., "woman", "womankind")
      - Count occurrences in each tweet separately
      - Provide the per-tweet counts plus the overall total
      
      Response format:
      Return a JSON object with:
      - One key per tweet: "1", "2", "3", …, mapping to the count of "women" in that tweet (integer)
      - "total": integer representing the total count of "women" across all tweets
      - "reasoning": brief explanation of your counting approach
      
      Example for 3 tweets:
      {"1": 2, "2": 0, "3": 1, "total": 3, "reasoning": "your approach here"}
    answer_type: "dict"
