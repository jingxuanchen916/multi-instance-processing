# Questions/tasks to evaluate - Named Entity Recognition
questions:
  Q1:
    id: "Q1"
    name: "count_entity_person"
    description: "Count occurrences of the entity 'PERSON' in all sentences"
    prompt_template: |
      Task: Count how many times the entity "PERSON" appears across all provided sentences.
      
      Background:
      - An entity may consist of multiple words that form a contiguous fragment in the text
      - You need to first identify entities in the sentence (named entity recognition), then count them
      - Two entities may appear consecutively without punctuation or words between them
      - No entity overlaps occur (each word belongs to at most one entity)
      - Some words do not belong to any entity
      
      Entity Definition:
      - PERSON: names of people, real or fictional, but not nominals
      
      Instructions:
      - Identify all PERSON entities across all sentences
      - Count the total number of PERSON entity mentions (not unique entities, but total occurrences)
      - Each distinct mention counts as one occurrence, even if it refers to the same person
      
      Response format:
      Return a JSON object with:
      - "reasoning": briefly explain how you identified the entities and counted them
      - "answer": integer count of PERSON entities
      
      Example:
      {"reasoning": "your approach here", "answer": 5}
    answer_type: "integer"
    
  Q2:
    id: "Q2"
    name: "count_entity_person_with_ids"
    description: "Count occurrences of the entity 'PERSON' in each sentence with IDs"
    prompt_template: |
      Task: Count how many times the entity "PERSON" appears in each sentence and provide the total count.
      
      Background:
      - An entity may consist of multiple words that form a contiguous fragment in the text
      - You need to first identify entities in each sentence (named entity recognition), then count them
      - Two entities may appear consecutively without punctuation or words between them
      - No entity overlaps occur (each word belongs to at most one entity)
      - Some words do not belong to any entity
      
      Entity Definition:
      - PERSON: names of people, real or fictional, but not nominals
      
      Instructions:
      - Identify all PERSON entities in each sentence
      - Count the number of PERSON entity mentions in each sentence separately
      - Provide the count for each sentence along with the total count across all sentences
      - Each distinct mention counts as one occurrence, even if it refers to the same person
      
      Response format:
      Return a JSON object with:
      - One key per sentence: "1", "2", "3", …, mapping to the integer count of PERSON mentions in that sentence
      - "total": total count of PERSON entities across all sentences
      - "reasoning": brief explanation of how you identified and counted the PERSON entities
      
      Example:
      {"1": 0, "2": 2, "3": 1, "total": 3, "reasoning": "your approach here"}
    answer_type: "dict"
