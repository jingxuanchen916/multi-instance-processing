# Questions/tasks to evaluate - News Category Classification
questions:
  Q1:
    id: "Q1"
    name: "count_tech_news"
    description: "Count how many news articles belong to the 'tech' category"
    prompt_template: |
      Task: Count how many of the provided news articles belong to the 'tech' category.
      
      Background:
      - Each news article belongs to one of 5 categories:
        * business
        * entertainment
        * politics
        * sport
        * tech
      - You need to classify each article based on its content and context
      
      Instructions:
      - Read each news article carefully
      - Identify which category each article belongs to based on the content
      - Count how many articles belong to the 'tech' category
      - Do not count articles from other categories (business, entertainment, politics, sport)
      - If you only receive one article, return 1 if it's tech, else return 0
      
      Response format:
      Return a JSON object with:
      - "reasoning": briefly explain your approach to classifying news categories and how you counted
      - "answer": integer count of tech news articles
      
      Example:
      {"reasoning": "your approach here", "answer": 42}
    answer_type: "integer"
    
  Q2:
    id: "Q2"
    name: "classify_news_categories"
    description: "Classify each news article into one of 5 categories and provide summary counts"
    prompt_template: |
      Task: For each news article, classify it into one of 5 categories, then provide total counts for each category.
      
      Background:
      - Each news article belongs to one of 5 categories:
        * business (label 0)
        * entertainment (label 1)
        * politics (label 2)
        * sport (label 3)
        * tech (label 4)
      - You need to classify each article based on its content and context
      
      Instructions:
      - Read each news article carefully and classify it into the most appropriate category
      - For each article, assign:
        * 0 if it's business news
        * 1 if it's entertainment news
        * 2 if it's politics news
        * 3 if it's sport news
        * 4 if it's tech news
      - Count the total number of articles for each category
      - Provide classification for each article along with summary counts
      
      Response format:
      Return a JSON object with:
      - One key per article: "1", "2", "3", …, mapping to the category label (0-4)
      - "business": integer count of articles classified as business
      - "entertainment": integer count of articles classified as entertainment
      - "politics": integer count of articles classified as politics
      - "sport": integer count of articles classified as sport
      - "tech": integer count of articles classified as tech
      - "reasoning": brief explanation of your approach to news classification
      
      Example for 3 articles:
      {"1": 4, "2": 0, "3": 3, "business": 1, "entertainment": 0, "politics": 0, "sport": 1, "tech": 1, "reasoning": "your approach here"}
    answer_type: "dict"
    
  Q3:
    id: "Q3"
    name: "classify_tech_binary"
    description: "Binary classification: identify each article as tech (1) or non-tech (0)"
    prompt_template: |
      Task: For each news article, identify whether it is a tech article (1) or non-tech article (0), then provide summary counts.
      
      Background:
      - Each news article can be classified as either:
        * tech (label 1): Technology news
        * non-tech (label 0): Any other category
      - You need to classify each article based on its content and context
      
      Instructions:
      - Read each news article carefully
      - For each article, assign:
        * 1 if it's tech news
        * 0 if it's non-tech news (business, entertainment, politics, or sport)
      - Count the total number of articles for each category
      - Provide classification for each article along with summary counts
      
      Response format:
      Return a JSON object with:
      - One key per article: "1", "2", "3", …, mapping to 1 (tech) or 0 (non-tech)
      - "tech": integer count of articles classified as tech
      - "non_tech": integer count of articles classified as non-tech
      - "reasoning": brief explanation of your approach to binary classification
      
      Example for 3 articles:
      {"1": 0, "2": 1, "3": 0, "tech": 1, "non_tech": 2, "reasoning": "your approach here"}
    answer_type: "dict"
