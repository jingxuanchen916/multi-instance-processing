# Questions/tasks to evaluate - Language Identification
questions:
  Q1:
    id: "Q1"
    name: "count_english_paragraphs"
    description: "Count how many paragraphs are in English"
    prompt_template: |
      Task: Count how many of the provided paragraphs are written in English.
      
      Background:
      The paragraphs are written in one of four languages:
      - English (label 0)
      - Chinese (label 1)
      - Persian (label 2)
      - Spanish (label 3)
      
      Instructions:
      - Read each paragraph carefully
      - Identify the language of each paragraph
      - Count how many paragraphs are written in English
      - Do not count paragraphs in other languages
      - If you only receive one paragraph, return 1 if it's English, else return 0
      
      Response format:
      Return a JSON object with:
      - "reasoning": briefly explain your approach to identifying English paragraphs
      - "answer": integer count of English paragraphs
      
      Example:
      {"reasoning": "your approach here", "answer": 5}
    answer_type: "integer"
    
  Q2:
    id: "Q2"
    name: "classify_language_all"
    description: "Classify each paragraph into one of 4 language categories and provide summary counts"
    prompt_template: |
      Task: For each paragraph, identify which language it is written in, then provide summary counts for all categories.
      
      Background:
      The paragraphs are written in one of four languages:
      - English (label 0)
      - Chinese (label 1)
      - Persian (label 2)
      - Spanish (label 3)
      
      Instructions:
      - Read each paragraph carefully and identify its language
      - Classify each paragraph using the labels:
        * 0 = English
        * 1 = Chinese
        * 2 = Persian
        * 3 = Spanish
      - Provide the classification for each individual paragraph
      - Also provide summary counts for all four language categories
      
      Response format:
      Return a JSON object with:
      - One key per paragraph: "1", "2", "3", …, mapping to the classification (0, 1, 2, or 3)
      - "english": integer count of paragraphs classified as English
      - "chinese": integer count of paragraphs classified as Chinese
      - "persian": integer count of paragraphs classified as Persian
      - "spanish": integer count of paragraphs classified as Spanish
      - "reasoning": brief explanation of your approach
      
      Example for 5 paragraphs:
      {"1": 0, "2": 1, "3": 2, "4": 3, "5": 0, "english": 2, "chinese": 1, "persian": 1, "spanish": 1, "reasoning": "your approach here"}
    answer_type: "dict"
    
  Q3:
    id: "Q3"
    name: "classify_english_binary"
    description: "Binary classification - English vs non-English with summary counts"
    prompt_template: |
      Task: For each paragraph, classify it as either English or non-English, then provide summary counts.
      
      Instructions:
      - Read each paragraph carefully
      - Classify each paragraph as either:
        * 1 = English
        * 0 = non-English (Chinese, Persian, or Spanish)
      - Provide the classification for each individual paragraph
      - Also provide summary counts for English and non-English categories
      
      Response format:
      Return a JSON object with:
      - One key per paragraph: "1", "2", "3", …, mapping to the binary classification (0 or 1)
      - "english": integer count of paragraphs classified as English
      - "non_english": integer count of paragraphs classified as non-English
      - "reasoning": brief explanation of your approach
      
      Example for 5 paragraphs:
      {"1": 1, "2": 0, "3": 0, "4": 0, "5": 1, "english": 2, "non_english": 3, "reasoning": "your approach here"}
    answer_type: "dict"
