questions:
  Q1:
    id: "Q1"
    name: "solve_arithmetic"
    description: "Solve all arithmetic questions and provide the sum of all answers"
    prompt_template: |
      Task: Solve all the provided arithmetic questions and calculate the sum of all answers.
      
      Instructions:
      - Calculate the answer for each arithmetic operation
      - Sum all individual answers
      - Provide exact values without unnecessary trailing zeros (e.g., "5" not "5.0")
      - Prefix negatives with '-' (e.g., "-42")
      - For decimal results, keep only necessary decimal places (e.g., "3.14" not "3.140")
      - If you only receive one question, the sum is just its answer
      
      Response format:
      Return a JSON object with:
      - "reasoning": briefly explain your calculation process
      - "answer": sum of all answers as a string
      
      Example:
      {"reasoning": "your approach here", "answer": "42"}
    answer_type: "string"

  Q2:
    id: "Q2"
    name: "solve_arithmetic_with_ids"
    description: "Solve each arithmetic question and provide answers with their IDs and the sum of all answers"
    prompt_template: |
      Task: Solve each of the provided arithmetic questions and calculate the sum of all answers.
      
      Instructions:
      - Calculate the answer for each arithmetic question
      - Use 1-based indexing for question numbers ("1", "2", "3", …)
      - Provide exact values without unnecessary trailing zeros (e.g., "5" not "5.0")
      - Prefix negatives with '-' (e.g., "-42")
      - For decimal results, keep only necessary decimal places (e.g., "3.14" not "3.140")
      - Sum all individual answers
      
      Response format:
      Return a JSON object with:
      - One key per question: "1", "2", "3", …, mapping to the answer as a string
      - "sum": sum of all answers as a string
      - "reasoning": brief explanation of your approach
      
      Example for 3 questions:
      {"1": "8", "2": "-30", "3": "5.6", "sum": "-16.4", "reasoning": "your approach here"}
    answer_type: "dict"
