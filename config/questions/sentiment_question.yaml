# Questions/tasks to evaluate for sentiment analysis
questions:
  Q1:
    id: "Q1"
    name: "count_positive_reviews"
    description: "Count how many reviews are positive"
    prompt_template: |
      Task: Count how many of the provided movie reviews are positive.
      
      Instructions:
      - Each review has a sentiment: positive or negative
      - Count only the reviews with positive sentiment
      - Return the total count of positive reviews
      - If you only receive one review, return 1 if it's positive, else return 0
      
      Response format:
      Return a JSON object with:
      - "reasoning": briefly explain how you solved this task
      - "answer": integer count of positive reviews
      
      Example:
      {"reasoning": "your approach here", "answer": 42}
    answer_type: "integer"
    
  Q2:
    id: "Q2"
    name: "classify_all_reviews"
    description: "Classify each review as positive (1) or negative (0) and provide summary counts"
    prompt_template: |
      Task: For each movie review, classify whether it is positive or negative, then provide summary counts.
      
      Instructions:
      - Classify each review as either:
        - 0 = negative sentiment
        - 1 = positive sentiment
      - Provide the classification for each individual review
      - Also provide summary counts for negative and positive reviews
      
      Response format:
      Return a JSON object with:
      - One key per review: "1", "2", "3", …, mapping to the classification (0 or 1)
      - "negative": integer count of reviews classified as negative
      - "positive": integer count of reviews classified as positive
      - "reasoning": brief explanation of your approach to classification
      
      Example for 3 reviews:
      {"1": 1, "2": 0, "3": 1, "negative": 1, "positive": 2, "reasoning": "your approach here"}
    answer_type: "dict"
