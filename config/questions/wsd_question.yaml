# Questions/tasks to evaluate - Word Sense Disambiguation
questions:
  Q1:
    id: "Q1"
    name: "count_apple_company"
    description: "Count how many paragraphs where 'apple' means the company (Apple Inc.)"
    data_file: "2500_wsd_apple"  # Uses 2500_wsd_apple_text.txt and 2500_wsd_apple_label.txt
    prompt_template: |
      Task: Count how many paragraphs contain the word "apple" referring to the company (Apple Inc.), not the fruit.
      
      Background:
      - Each paragraph contains exactly one occurrence of the word "apple" (case-insensitive, as a complete word, not as part of another word)
      - This "apple" can mean either:
        * The company: Apple Inc., the technology company
        * The fruit: the edible fruit that grows on apple trees
      - You need to determine the meaning of "apple" in each paragraph based on context
      
      Instructions:
      - Read each paragraph carefully
      - Identify whether "apple" refers to the company or the fruit based on contextual clues
      - Count how many paragraphs where "apple" means the company (Apple Inc.)
      - Do not count paragraphs where "apple" means the fruit
      - If you only receive one paragraph, return 1 if it means the company, else return 0
      
      Response format:
      Return a JSON object with:
      - "reasoning": briefly explain your approach to disambiguating the word sense and how you counted
      - "answer": integer count of paragraphs where "apple" means the company
      
      Example:
      {"reasoning": "your approach here", "answer": 42}
    answer_type: "integer"
    
  Q2:
    id: "Q2"
    name: "classify_apple_meaning"
    description: "Classify the meaning of 'apple' in each paragraph and count totals"
    data_file: "2500_wsd_apple"  # Uses 2500_wsd_apple_text.txt and 2500_wsd_apple_label.txt
    prompt_template: |
      Task: For each paragraph, identify whether the word "apple" refers to the company or the fruit, then provide total counts.
      
      Background:
      - Each paragraph contains exactly one occurrence of the word "apple" (case-insensitive, as a complete word, not as part of another word)
      - This "apple" can mean either:
        * The company (label 0): Apple Inc., the technology company
        * The fruit (label 1): the edible fruit that grows on apple trees
      - You need to determine the meaning of "apple" in each paragraph based on context
      
      Instructions:
      - Read each paragraph carefully and classify the meaning of "apple"
      - For each paragraph, assign:
        * 0 if "apple" means the company (Apple Inc.)
        * 1 if "apple" means the fruit
      - Count the total number of paragraphs for each category
      - Provide classification for each paragraph along with summary counts
      
      Response format:
      Return a JSON object with:
      - One key per paragraph: "1", "2", "3", …, mapping to either 0 (company) or 1 (fruit)
      - "company": integer count of paragraphs where "apple" means the company
      - "fruit": integer count of paragraphs where "apple" means the fruit
      - "reasoning": brief explanation of your approach to word sense disambiguation
      
      Example for 3 paragraphs:
      {"1": 0, "2": 1, "3": 0, "company": 2, "fruit": 1, "reasoning": "your approach here"}
    answer_type: "dict"
